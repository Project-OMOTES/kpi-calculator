name: Build-Test-Lint-etc (linux)

on: [push]

jobs:
  setup:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    name: Setup
    steps:
      - uses: actions/checkout@v3
      - name: Install uv
        uses: astral-sh/setup-uv@v1
        with:
          version: "latest"
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Create virtual environment and install dependencies
        run: uv sync --dev
      - name: 'Tar venv'
        run: tar -cvf venv.tar ./.venv/
      - name: Save venv
        uses: actions/upload-artifact@v4
        with:
          path: ./venv.tar
          name: ${{ runner.os }}-python-${{ matrix.python-version }}-venv-${{github.run_id}}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [ setup ]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v3
      - name: Restore venv
        uses: actions/download-artifact@v4
        with:
          name: ${{ runner.os }}-python-${{ matrix.python-version }}-venv-${{github.run_id}}
      - name: Untar venv
        run: tar -xvf venv.tar
      - name: Run lint
        run: |
          . .venv/bin/activate
          uv run flake8 --max-line-length=100 ./src/ ./unit_test/ --exclude=src/kpicalculator/adapters/xml_time_series_adapter.py

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [ setup ]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v3
      - name: Restore venv
        uses: actions/download-artifact@v4
        with:
          name: ${{ runner.os }}-python-${{ matrix.python-version }}-venv-${{github.run_id}}
      - name: Untar venv
        run: tar -xvf venv.tar
      - name: Run unit tests
        run: |
          . .venv/bin/activate
          PYTHONPATH=src uv run pytest --junit-xml=test-results.xml unit_test/
      - name: Surface failing tests
        if: always()
        uses: pmeier/pytest-results-action@main
        with:
          # A list of JUnit XML files, directories containing the former, and wildcard
          # patterns to process.
          # See @actions/glob for supported patterns.
          path: test-results.xml

          # Add a summary of the results at the top of the report
          # Default: true
          summary: true

          # Select which results should be included in the report.
          # Follows the same syntax as
          # `pytest -r`
          # Default: fEX
          display-options: fEX

          # Fail the workflow if no JUnit XML was found.
          # Default: true
          fail-on-empty: true

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: [ setup ]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v3
      - name: Restore venv
        uses: actions/download-artifact@v4
        with:
          name: ${{ runner.os }}-python-${{ matrix.python-version }}-venv-${{github.run_id}}
      - name: Untar venv
        run: tar -xvf venv.tar
      - name: Add mypy annotator
        uses: pr-annotators/mypy-pr-annotator@v1.0.0
      - name: Run typechecker
        run: |
          . .venv/bin/activate
          uv run mypy ./src/kpicalculator

  build:
    name: Build the python package
    runs-on: ubuntu-latest
    needs: [ setup ]
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.11" ]
    steps:
      - uses: actions/checkout@v3
      - name: Restore venv
        uses: actions/download-artifact@v4
        with:
          name: ${{ runner.os }}-python-${{ matrix.python-version }}-venv-${{github.run_id}}
      - name: Untar venv
        run: tar -xvf venv.tar
      - name: Build
        run: |
          . .venv/bin/activate
          uv build
