name: Build-Test-Lint-etc (linux)

on:
  push:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    name: Setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v1
        with:
          version: "latest"
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Create virtual environment and install dependencies
        run: uv sync --group dev --no-editable
      - name: 'Tar venv'
        run: tar -cvf venv.tar ./.venv/
      - name: Save venv
        uses: actions/upload-artifact@v4
        with:
          path: ./venv.tar
          name: ${{ runner.os }}-python-${{ matrix.python-version }}-venv-${{github.run_id}}

  quality:
    name: Code Quality (Lint + Typecheck)
    runs-on: ubuntu-latest
    needs: [ setup ]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v1
        with:
          version: "latest"
      - name: Restore venv
        uses: actions/download-artifact@v4
        with:
          name: ${{ runner.os }}-python-${{ matrix.python-version }}-venv-${{github.run_id}}
      - name: Untar venv
        run: tar -xvf venv.tar
      - name: Run lint
        run: |
          uv run ruff check ./src/ ./unit_test/
          uv run ruff format --check ./src/ ./unit_test/
      - name: Add mypy annotator
        uses: pr-annotators/mypy-pr-annotator@v1.0.0
      - name: Run typechecker
        run: |
          uv run mypy ./src/kpicalculator

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [ setup ]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v1
        with:
          version: "latest"
      - name: Restore venv
        uses: actions/download-artifact@v4
        with:
          name: ${{ runner.os }}-python-${{ matrix.python-version }}-venv-${{github.run_id}}
      - name: Untar venv
        run: tar -xvf venv.tar
      - name: Run unit tests with coverage
        run: |
          uv run pytest --cov=src/kpicalculator --maxfail=5 --disable-warnings --junit-xml=test-results.xml unit_test/
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-html
          path: htmlcov/
      - name: Surface failing tests
        if: always()
        uses: pmeier/pytest-results-action@main
        with:
          path: test-results.xml
          summary: true
          display-options: fEX
          fail-on-empty: true

  build:
    name: Build the python package
    runs-on: ubuntu-latest
    needs: [ quality, test ]
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.11" ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Conditional fetch depth based on event type:
          # - Release or manual workflow: fetch-depth: 0 (full history with tags for versioning)
          # - Regular push: fetch-depth: 1 (shallow clone for speed)
          # Logic: (is_publishing_event) ? 0 : 1
          fetch-depth: ${{ (github.event_name == 'release' || github.event_name == 'workflow_dispatch') && 0 || 1 }}
      - name: Install uv
        uses: astral-sh/setup-uv@v1
        with:
          version: "latest"
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Build
        run: |
          uv build
      - name: Store distribution packages
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7

  verify:
    name: Verify package quality
    needs: [build]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v1
        with:
          version: "latest"
      - name: Set up Python
        run: uv python install 3.11
      - name: Download built packages
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - name: Install package from wheel in clean environment
        run: |
          uv venv .venv-test
          source .venv-test/bin/activate
          uv pip install dist/*.whl
      - name: Verify package metadata and imports
        run: |
          source .venv-test/bin/activate
          python -c "import kpicalculator; print(f'Package imported successfully')"
          python -c "import importlib.metadata; meta = importlib.metadata.metadata('kpi-calculator'); print(f'Name: {meta[\"Name\"]}'); print(f'Version: {meta[\"Version\"]}')"
      - name: Run security checks on dependencies
        run: |
          # Install wheel to check its dependencies for vulnerabilities
          uv venv .venv-audit
          uv pip install --python .venv-audit dist/*.whl
          # Install pip-audit in separate step to distinguish package deps from tooling
          uv pip install --python .venv-audit pip-audit
          # Audit the environment - includes both package deps and pip-audit
          # Note: Ideally we'd only audit package deps, but pip-audit doesn't support that granularity
          # If this fails due to pip-audit vulns (not package deps), consider using --ignore-vuln
          # --ignore-dep kpi-calculator: skip the local package (not yet on PyPI during this workflow)
          uv run --python .venv-audit pip-audit --desc on --ignore-dep kpi-calculator
      - name: Check package description will render on PyPI
        run: |
          uv tool install twine
          uv tool run twine check dist/*

  publish-to-pypi:
    name: Publish to PyPI
    needs: [build, verify]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      id-token: write  # Required for trusted publishing to PyPI
      contents: read
    steps:
      - name: Download built packages
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true
          verbose: true

  create-github-release-notes:
    name: Add artifacts to GitHub Release
    needs: [publish-to-pypi]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Download built packages
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: 'dist/*'
      - name: Upload artifacts to GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          # --clobber allows re-running workflow without errors if artifacts already exist
          gh release upload '${{ github.ref_name }}' dist/** --repo '${{ github.repository }}' --clobber
